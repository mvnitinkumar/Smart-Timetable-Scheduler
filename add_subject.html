{% extends "base.html" %}
{% block content %}
<h2>Add Subject</h2>
<form method="POST">
<input type="text" name="subject" placeholder="Subject Name" required><br><br>
<select name="faculty">
{% for faculty in faculty_list %}
<option value="{{ faculty[0] }}">{{ faculty[0] }}</option>
{% endfor %}
</select><br><br>
<input type="number" name="hours" placeholder="Hours Per Week" required><br><br>
<button type="submit">Add Subject</button>
</form>
{% endblock %}
